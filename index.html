<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>விலை விபரம் - வலி கிழக்கு வட பகுதி ப.நோ.கூ.சங்கம்</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --navy:#0d2a5c;
    --navy-deep:#081d42;
    --gold:#c9a227;
    --paper:#ffffff;
    --line:#0d2a5c;
    --muted:#5a6b8c;
    --bg:#eef1f8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans Tamil','Latha','Nirmala UI',sans-serif;
    background:var(--bg);
    color:#1a1a1a;
    padding:24px 12px 60px;
  }
  .app{
    max-width:1000px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .toolbar{
    background:var(--paper);
    border-radius:14px;
    padding:16px 18px;
    box-shadow:0 2px 10px rgba(13,42,92,0.08);
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:flex-end;
  }
  .field{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--muted);}
  .field input, .field select{
    font-family:inherit;
    padding:8px 10px;
    border:1px solid #cfd6e6;
    border-radius:8px;
    font-size:14px;
    min-width:170px;
  }
  .btn{
    border:none;
    border-radius:9px;
    padding:9px 16px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:transform .1s ease, box-shadow .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-deep);}
  .btn-gold{background:var(--gold);color:#3a2c00;}
  .btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
  .btn-danger{background:#fff;color:#b3261e;border:1.5px solid #b3261e;}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:7px;}
  .spacer{flex:1;}

  .add-row{
    background:var(--paper);
    border-radius:14px;
    padding:16px 18px;
    box-shadow:0 2px 10px rgba(13,42,92,0.08);
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:flex-end;
  }

  /* ---- Poster ---- */
  #posterWrap{ display:flex; justify-content:center; }
  #poster{
    width:720px;
    max-width:100%;
    background:var(--paper);
    padding:22px;
    position:relative;
  }
  .poster-frame{
    border:2.5px solid var(--navy);
    border-radius:10px;
    padding:18px 18px 24px;
    position:relative;
  }
  .corner{
    position:absolute;
    width:34px;height:34px;
    color:var(--navy);
    opacity:.85;
  }
  .corner.tl{top:-2px;left:-2px;}
  .corner.tr{top:-2px;right:-2px;transform:scaleX(-1);}
  .corner.bl{bottom:-2px;left:-2px;transform:scaleY(-1);}
  .corner.br{bottom:-2px;right:-2px;transform:scale(-1,-1);}

  .header-box{
    background:var(--navy);
    color:#fff;
    border-radius:10px;
    padding:16px 10px;
    text-align:center;
    margin-bottom:16px;
  }
  .company-name{
    font-size:26px;
    font-weight:700;
    line-height:1.35;
    margin:0;
    word-break:break-word;
  }
  .title-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:14px 0 6px;
  }
  .title-row .deco{color:var(--gold);font-size:18px;}
  .price-title{
    font-size:26px;
    font-weight:800;
    color:var(--navy);
    margin:0;
  }
  .date-pill{
    display:inline-block;
    background:var(--navy);
    color:#fff;
    font-weight:700;
    font-size:18px;
    padding:6px 22px;
    border-radius:8px;
    margin:6px auto 16px;
    letter-spacing:.5px;
  }
  .date-wrap{text-align:center;}

  table.price-table{
    width:100%;
    border-collapse:collapse;
    border:2px solid var(--navy);
  }
  table.price-table thead th{
    background:var(--navy);
    color:#fff;
    font-size:15px;
    padding:10px 8px;
    border:1px solid var(--navy);
  }
  table.price-table td{
    border:1px solid var(--navy);
    padding:8px 10px;
    font-size:15px;
  }
  table.price-table td.no{text-align:center;width:40px;color:var(--navy);font-weight:700;}
  table.price-table td.item{color:#1a1a1a;}
  table.price-table td.price{text-align:right;font-weight:700;color:#1a1a1a;width:130px;}
  table.price-table tbody tr:nth-child(even){background:#f5f7fc;}

  .footer-note{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    margin-top:10px;
  }

  /* ---- Editable list (management view) ---- */
  .manage{
    background:var(--paper);
    border-radius:14px;
    padding:8px 4px;
    box-shadow:0 2px 10px rgba(13,42,92,0.08);
    overflow-x:auto;
  }
  table.manage-table{width:100%;border-collapse:collapse;}
  table.manage-table th{
    text-align:left;
    font-size:12px;
    color:var(--muted);
    padding:10px 12px;
    border-bottom:2px solid #e4e8f2;
  }
  table.manage-table td{
    padding:6px 10px;
    border-bottom:1px solid #eef0f7;
  }
  table.manage-table input{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    padding:6px 8px;
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
  }
  table.manage-table input:hover{border-color:#dfe4f0;}
  table.manage-table input:focus{border-color:var(--navy);outline:none;background:#fff;}
  table.manage-table input.price-input{text-align:right;}
  .row-no{color:var(--muted);font-size:13px;width:36px;text-align:center;}
  .row-actions{width:70px;text-align:center;}

  .sheet-panel{
    background:var(--paper);
    border-radius:14px;
    padding:16px 18px;
    box-shadow:0 2px 10px rgba(13,42,92,0.08);
    font-size:13px;
    color:#333;
  }
  .sheet-panel h3{margin:0 0 8px;font-size:15px;color:var(--navy);}
  .sheet-panel p{margin:6px 0;line-height:1.5;color:var(--muted);}
  .sheet-panel code{
    background:#f2f4f9;
    padding:2px 6px;
    border-radius:5px;
    font-size:12px;
  }
  .sheet-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px;}
  .status-msg{font-size:13px;margin-left:6px;}
  .status-ok{color:#1a7f37;}
  .status-err{color:#b3261e;}
  details summary{cursor:pointer;color:var(--navy);font-weight:600;font-size:13px;}
  pre.script-code{
    background:#0d2a5c;
    color:#dbe6ff;
    padding:12px;
    border-radius:8px;
    font-size:11px;
    overflow-x:auto;
    white-space:pre;
    margin-top:8px;
  }

  @media (max-width:640px){
    .company-name{font-size:20px;}
    .price-title{font-size:20px;}
    #poster{padding:12px;}
    table.price-table td, table.price-table thead th{font-size:13px;padding:6px;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="toolbar">
    <div class="field">
      <label>Company Name</label>
      <input id="companyName" value="வலி கிழக்கு வட பகுதி ப.நோ.கூ.சங்கம் அச்சுவேலி" style="min-width:320px;">
    </div>
    <div class="field">
      <label>Date</label>
      <input id="dateInput" type="date">
    </div>
    <div class="spacer"></div>
    <button class="btn btn-gold" id="downloadJpgBtn">📷 Download JPG</button>
    <button class="btn btn-outline" id="exportCsvBtn">Export CSV</button>
    <button class="btn btn-outline" id="saveJsonBtn">💾 Save (Backup)</button>
    <label class="btn btn-outline" style="cursor:pointer;">
      📂 Open
      <input type="file" id="loadJsonInput" accept="application/json" style="display:none;">
    </label>
  </div>

  <div class="add-row">
    <div class="field">
      <label>Item Name</label>
      <select id="newItem" style="min-width:220px;">
        <option value="">-- Select Item --</option>
      </select>
    </div>
    <div class="field">
      <label>Price (Rs.)</label>
      <input id="newPrice" type="number" step="0.01" placeholder="0.00" style="min-width:120px;">
    </div>
    <button class="btn btn-primary" id="addItemBtn">+ Add Item</button>
    <div class="spacer"></div>
    <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
  </div>


  <!-- Editable management table -->
  <div class="manage">
    <table class="manage-table">
      <thead>
        <tr>
          <th>இல</th>
          <th>பொருளின் விபரம்</th>
          <th>விலை (ரூ.)</th>
          <th>நீக்கு</th>
        </tr>
      </thead>
      <tbody id="manageBody"></tbody>
    </table>
  </div>

  <!-- Poster preview (this is what gets exported as JPG) -->
  <div id="posterWrap">
    <div id="poster">
      <div class="poster-frame">
        <svg class="corner tl" viewBox="0 0 40 40"><path d="M2 2 L2 20 M2 2 L20 2" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="2" cy="2" r="3" fill="currentColor"/></svg>
        <svg class="corner tr" viewBox="0 0 40 40"><path d="M2 2 L2 20 M2 2 L20 2" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="2" cy="2" r="3" fill="currentColor"/></svg>
        <svg class="corner bl" viewBox="0 0 40 40"><path d="M2 2 L2 20 M2 2 L20 2" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="2" cy="2" r="3" fill="currentColor"/></svg>
        <svg class="corner br" viewBox="0 0 40 40"><path d="M2 2 L2 20 M2 2 L20 2" stroke="currentColor" stroke-width="3" fill="none"/><circle cx="2" cy="2" r="3" fill="currentColor"/></svg>

        <div class="header-box">
          <p class="company-name" id="posterCompanyName">வலி கிழக்கு வட பகுதி ப.நோ.கூ.சங்கம் அச்சுவேலி</p>
        </div>

        <div class="title-row">
          <span class="deco">❖ ⟡ ❖</span>
          <h2 class="price-title">விலை விபரம்</h2>
          <span class="deco">❖ ⟡ ❖</span>
        </div>
        <div class="date-wrap">
          <span class="date-pill" id="posterDate">--.--.----</span>
        </div>

        <table class="price-table">
          <thead>
            <tr>
              <th style="width:40px;">இல</th>
              <th>பொருட்களின் விபரம்</th>
              <th style="width:130px;">விற்கும் விலை (ரூ.)</th>
            </tr>
          </thead>
          <tbody id="posterBody"></tbody>
        </table>

      </div>
    </div>
  </div>

</div>

<script>
let items = [];

const manageBody = document.getElementById('manageBody');
const posterBody = document.getElementById('posterBody');
const companyNameInput = document.getElementById('companyName');
const posterCompanyName = document.getElementById('posterCompanyName');
const dateInput = document.getElementById('dateInput');
const posterDate = document.getElementById('posterDate');

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
dateInput.value = todayStr();

function formatDate(iso){
  if(!iso) return '--.--.----';
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.${y}`;
}

function formatPrice(n){
  const num = Number(n)||0;
  return num.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function render(){
  manageBody.innerHTML = '';
  posterBody.innerHTML = '';

  items.forEach((row, idx) => {
    // management row
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="row-no">${idx+1}</td>
      <td><input type="text" value="${escapeHtml(row.item)}" data-idx="${idx}" data-field="item"></td>
      <td><input type="number" step="0.01" class="price-input" value="${row.price}" data-idx="${idx}" data-field="price"></td>
      <td class="row-actions"><button class="btn btn-danger btn-sm" data-del="${idx}">✕</button></td>
    `;
    manageBody.appendChild(tr);

    // poster row
    const ptr = document.createElement('tr');
    ptr.innerHTML = `
      <td class="no">${idx+1}</td>
      <td class="item">${escapeHtml(row.item)}</td>
      <td class="price">${formatPrice(row.price)}</td>
    `;
    posterBody.appendChild(ptr);
  });

  posterCompanyName.textContent = companyNameInput.value || ' ';
  posterDate.textContent = formatDate(dateInput.value);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

manageBody.addEventListener('input', (e) => {
  const idx = e.target.getAttribute('data-idx');
  const field = e.target.getAttribute('data-field');
  if(idx === null) return;
  items[idx][field] = field === 'price' ? Number(e.target.value) : e.target.value;
  // update poster live without full rerender jank
  posterBody.children[idx].querySelector(field==='item' ? '.item' : '.price').textContent =
    field === 'item' ? e.target.value : formatPrice(e.target.value);
  if(field === 'price'){
    queuePriceSync(items[idx].item, items[idx].price);
  }
});

manageBody.addEventListener('click', (e) => {
  const delIdx = e.target.getAttribute('data-del');
  if(delIdx !== null){
    items.splice(Number(delIdx), 1);
    render();
  }
});

document.getElementById('addItemBtn').addEventListener('click', () => {
  const itemName = document.getElementById('newItem').value.trim();
  const price = document.getElementById('newPrice').value;
  if(!itemName){ alert('பொருளின் பெயரை தேர்ந்தெடுக்கவும்'); return; }
  items.push({ item: itemName, price: Number(price)||0 });
  document.getElementById('newItem').value = '';
  document.getElementById('newPrice').value = '';
  document.getElementById('newItem').focus();
  render();
});

document.getElementById('newPrice').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('addItemBtn').click();
});
document.getElementById('newItem').addEventListener('change', () => {
  document.getElementById('newPrice').focus();
});

document.getElementById('clearAllBtn').addEventListener('click', () => {
  if(confirm('அனைத்து பொருட்களையும் நீக்க வேண்டுமா?')){
    items = [];
    render();
  }
});

companyNameInput.addEventListener('input', render);
dateInput.addEventListener('input', render);

// ---- JPG export ----
document.getElementById('downloadJpgBtn').addEventListener('click', () => {
  const poster = document.getElementById('poster');
  html2canvas(poster, { scale: 3, backgroundColor: '#ffffff' }).then(canvas => {
    const link = document.createElement('a');
    const dateForFile = dateInput.value || todayStr();
    link.download = `விலை-விபரம்-${dateForFile}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  });
});

// ---- CSV export (Google Sheets compatible import) ----
document.getElementById('exportCsvBtn').addEventListener('click', () => {
  let csv = 'இல,பொருள்,விலை\n';
  items.forEach((row, idx) => {
    csv += `${idx+1},"${row.item.replace(/"/g,'""')}",${row.price}\n`;
  });
  const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `price-list-${dateInput.value || todayStr()}.csv`;
  link.click();
});

// ---- JSON backup (since data is not saved automatically) ----
document.getElementById('saveJsonBtn').addEventListener('click', () => {
  const payload = {
    companyName: companyNameInput.value,
    date: dateInput.value,
    items
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `price-list-backup-${dateInput.value || todayStr()}.json`;
  link.click();
});

document.getElementById('loadJsonInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const data = JSON.parse(ev.target.result);
      if(data.companyName) companyNameInput.value = data.companyName;
      if(data.date) dateInput.value = data.date;
      if(Array.isArray(data.items)) items = data.items;
      render();
    }catch(err){
      alert('கோப்பை படிக்க முடியவில்லை');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ---- Item name list from Google Sheet (published as CSV) ----
// Paste your published Google Sheet CSV link below (between the quotes).
// How to get it: open your Sheet -> File -> Share -> Publish to web ->
// choose the sheet/tab -> format "Comma-separated values (.csv)" -> Publish -> copy link.
const GOOGLE_SHEET_CSV_URL = "https://script.google.com/macros/s/AKfycbzPObtlXSqgndgREsq2pz-TjqNlEqMdWC4KQzUai4BfoUOUrQl__TvxRh_6-IOnfm2A/exec";

// Paste your Apps Script Web App URL below to allow price updates to sync
// back into the same sheet (updates existing row only, never adds a new one).
// See the setup instructions provided separately for the exact script to deploy.
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPObtlXSqgndgREsq2pz-TjqNlEqMdWC4KQzUai4BfoUOUrQl__TvxRh_6-IOnfm2A/exec";

let priceSyncTimers = {};
function queuePriceSync(itemName, price){
  if(!APPS_SCRIPT_URL || !itemName) return;
  clearTimeout(priceSyncTimers[itemName]);
  priceSyncTimers[itemName] = setTimeout(() => {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ item: itemName, price: price })
    }).catch(err => console.error('Price sync failed:', err));
  }, 800); // wait until typing pauses before sending
}

const newItemSelect = document.getElementById('newItem');

function parseCsvFirstColumn(text){
  return text
    .split(/\r?\n/)
    .map(line => line.split(',')[0].replace(/^"|"$/g, '').trim())
    .filter(line => line.length > 0)
    // drop an obvious header row like "Item" / "பொருள்" / "Item Name"
    .filter(line => !/^(item|item name|பொருள்|பொருளின் பெயர்)$/i.test(line));
}

function setItemOptions(names){
  newItemSelect.innerHTML = '<option value="">-- Select Item --</option>';
  names.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    newItemSelect.appendChild(opt);
  });
}

async function loadSheetList(){
  if(!GOOGLE_SHEET_CSV_URL) return; // no link configured yet, dropdown stays empty
  try{
    const res = await fetch(GOOGLE_SHEET_CSV_URL);
    if(!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const names = parseCsvFirstColumn(text);
    if(names.length) setItemOptions(names);
  }catch(err){
    console.error('Could not load item list from Google Sheet:', err);
  }
}

loadSheetList();
render();
</script>
</body>
</html>
